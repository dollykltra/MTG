<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send your message to GOD</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0514;
        font-family: 'Georgia', serif;
        margin: 0;
      }
      .container {
        text-align: center;
        padding: 40px 50px;
        background: rgba(10, 5, 20, 0.55);
        backdrop-filter: blur(12px);
        border-radius: 30px;
        border: 1px solid rgba(255, 215, 0, 0.25);
        box-shadow: 0 0 80px rgba(138, 43, 226, 0.3);
        max-width: 600px;
        width: 90%;
      }
      h1 {
        font-size: 2.8rem;
        background: linear-gradient(135deg, #f3e7c9, #ffd700);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 30px;
        letter-spacing: 4px;
      }
      textarea {
        width: 100%;
        padding: 18px 20px;
        font-size: 1.1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.25);
        border-radius: 16px;
        color: #f0e6d0;
        font-family: 'Georgia', serif;
        resize: vertical;
        min-height: 100px;
        outline: none;
        box-sizing: border-box;
        margin-bottom: 15px;
      }
      textarea::placeholder {
        color: rgba(255, 215, 0, 0.4);
        font-style: italic;
      }
      .file-input-wrapper {
        margin: 15px 0;
        text-align: left;
      }
      .file-input-wrapper label {
        display: inline-block;
        padding: 10px 20px;
        background: rgba(255, 215, 0, 0.15);
        border: 1px solid rgba(255, 215, 0, 0.3);
        border-radius: 30px;
        color: #f0e6d0;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.95rem;
      }
      .file-input-wrapper label:hover {
        background: rgba(255, 215, 0, 0.25);
        border-color: #ffd700;
      }
      .file-input-wrapper input[type="file"] {
        display: none;
      }
      #fileName {
        display: inline-block;
        margin-left: 15px;
        color: rgba(255, 215, 0, 0.7);
        font-size: 0.9rem;
      }
      .record-wrapper {
        margin: 15px 0;
        display: flex;
        align-items: center;
        gap: 15px;
        justify-content: center;
      }
      .record-btn {
        padding: 12px 25px;
        font-size: 1rem;
        font-weight: bold;
        background: #8b0000;
        border: none;
        border-radius: 30px;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: 'Georgia', serif;
        letter-spacing: 1px;
      }
      .record-btn:hover {
        background: #a00000;
        transform: scale(1.03);
      }
      .record-btn.recording {
        background: #ff0000;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      #audioStatus {
        color: rgba(255, 215, 0, 0.7);
        font-size: 0.9rem;
      }
      button.send-btn {
        padding: 14px 50px;
        font-size: 1.3rem;
        font-weight: bold;
        background: linear-gradient(145deg, #b8860b, #ffd700);
        border: none;
        border-radius: 50px;
        color: #0a0514;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        letter-spacing: 3px;
        font-family: 'Georgia', serif;
        margin-top: 15px;
      }
      button.send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 70px rgba(255, 215, 0, 0.6);
      }
      button.send-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      #status {
        margin-top: 20px;
        font-size: 1.1rem;
        color: #f0e6d0;
        min-height: 30px;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <h1>✦ Send your message to GOD ✦</h1>

      <form id="messageForm">
        <textarea id="messageInput" placeholder="Type your prayer, thought, or message..."></textarea>

        <div class="file-input-wrapper">
          <label for="imageUpload">📷 Choose Image</label>
          <input type="file" id="imageUpload" accept="image/*">
          <span id="fileName">No file chosen</span>
        </div>

        <div class="record-wrapper">
          <button type="button" class="record-btn" id="recordBtn">🎙️ Record Voice</button>
          <span id="audioStatus">Not recording</span>
        </div>

        <button type="submit" class="send-btn" id="sendButton">✦ Send ✦</button>
      </form>

      <div id="status"></div>
    </div>

    <script>
      // === YOUR WEB APP URL ===
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNC1rAhX62hn-UbxAxVWjTAP4ho2vChmEctiJdHYRPsJhoTHWJNrgmi1z8HLUCr2wGBw/exec';

      const form = document.getElementById('messageForm');
      const messageInput = document.getElementById('messageInput');
      const imageUpload = document.getElementById('imageUpload');
      const fileName = document.getElementById('fileName');
      const recordBtn = document.getElementById('recordBtn');
      const audioStatus = document.getElementById('audioStatus');
      const sendBtn = document.getElementById('sendButton');
      const statusDiv = document.getElementById('status');

      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;

      // File input handler
      imageUpload.addEventListener('change', function() {
        fileName.textContent = this.files.length > 0 ? this.files[0].name : 'No file chosen';
      });

      // Voice recorder
      recordBtn.addEventListener('click', async function() {
        if (isRecording) {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
          isRecording = false;
          this.classList.remove('recording');
          this.textContent = '🎙️ Record Voice';
          audioStatus.textContent = 'Processing...';
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = function(event) {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = function() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function() {
              window._audioData = reader.result;
              audioStatus.textContent = '✓ Recording saved!';
              recordBtn.textContent = '🎙️ Record Again';
              recordBtn.classList.remove('recording');
            };
            reader.readAsDataURL(audioBlob);
            stream.getTracks().forEach(track => track.stop());
          };

          mediaRecorder.start();
          isRecording = true;
          this.classList.add('recording');
          this.textContent = '⏹️ Stop Recording';
          audioStatus.textContent = 'Recording... Speak now';
          window._audioData = null;

        } catch (err) {
          audioStatus.textContent = '❌ Microphone access denied.';
          console.error(err);
        }
      });

      // Form submit handler
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const message = messageInput.value.trim();
        if (!message) {
          statusDiv.style.color = '#ff6b6b';
          statusDiv.textContent = '✧ Please write a message first. ✧';
          return;
        }

        sendBtn.disabled = true;
        sendBtn.textContent = 'Sending...';
        statusDiv.style.color = '#ffd700';
        statusDiv.textContent = '✧ Preparing your message... ✧';

        try {
          // Get IP
          const ipRes = await fetch('https://api.ipify.org?format=json');
          const ipData = await ipRes.json();
          const ip = ipData.ip || 'Not available';

          const userAgent = navigator.userAgent || 'Not available';
          const timestamp = new Date().toString();

          // Build POST data
          const params = new URLSearchParams();
          params.append('message', message);
          params.append('ip', ip);
          params.append('userAgent', userAgent);
          params.append('timestamp', timestamp);

          // Handle image
          if (imageUpload.files.length > 0) {
            const file = imageUpload.files[0];
            const reader = new FileReader();
            const imageData = await new Promise((resolve, reject) => {
              reader.onload = () => resolve(reader.result);
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });
            params.append('imageData', imageData);
          }

          // Handle audio
          if (window._audioData) {
            params.append('audioData', window._audioData);
          }

          statusDiv.textContent = '✧ Your message is ascending... ✧';

          // Send POST request
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: params.toString()
          });

          const result = await response.text();

          if (result.includes('Success')) {
            statusDiv.style.color = '#7bed9f';
            statusDiv.textContent = '✓ ' + result;
            messageInput.value = '';
            imageUpload.value = '';
            fileName.textContent = 'No file chosen';
            window._audioData = null;
            audioStatus.textContent = 'Not recording';
            recordBtn.textContent = '🎙️ Record Voice';
            recordBtn.classList.remove('recording');
          } else {
            statusDiv.style.color = '#ff6b6b';
            statusDiv.textContent = '✧ ' + result;
          }

        } catch (error) {
          statusDiv.style.color = '#ff6b6b';
          statusDiv.textContent = '✧ Error: ' + error.message;
        }

        sendBtn.disabled = false;
        sendBtn.textContent = '✦ Send ✦';
      });
    </script>

  </body>
</html>
