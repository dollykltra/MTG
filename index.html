<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send your message to GOD</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0514;
        font-family: 'Georgia', serif;
        padding: 20px;
      }
      .container {
        max-width: 500px;
        width: 100%;
        padding: 40px;
        background: rgba(255,255,255,0.05);
        border-radius: 20px;
        border: 1px solid rgba(255,215,0,0.2);
        box-shadow: 0 0 60px rgba(138,43,226,0.2);
        text-align: center;
      }
      h1 {
        font-size: 2.2rem;
        color: #ffd700;
        margin-bottom: 25px;
        text-shadow: 0 0 30px rgba(255,215,0,0.2);
      }
      textarea {
        width: 100%;
        padding: 15px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,215,0,0.2);
        border-radius: 12px;
        color: #fff;
        font-size: 1rem;
        font-family: 'Georgia', serif;
        resize: vertical;
        min-height: 100px;
        outline: none;
        margin-bottom: 15px;
      }
      textarea::placeholder { color: rgba(255,215,0,0.4); }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 30px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s;
        font-family: 'Georgia', serif;
      }
      .btn-image {
        background: rgba(255,215,0,0.15);
        color: #ffd700;
        border: 1px solid rgba(255,215,0,0.3);
        display: inline-block;
      }
      .btn-image:hover { background: rgba(255,215,0,0.25); }
      .btn-record {
        background: #8b0000;
        color: white;
      }
      .btn-record:hover { background: #a00000; }
      .btn-record.recording {
        background: #ff0000;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .btn-send {
        width: 100%;
        padding: 14px;
        font-size: 1.2rem;
        background: linear-gradient(145deg, #b8860b, #ffd700);
        color: #0a0514;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
        font-family: 'Georgia', serif;
      }
      .btn-send:hover { transform: scale(1.02); box-shadow: 0 0 40px rgba(255,215,0,0.3); }
      .btn-send:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
      #status {
        margin-top: 15px;
        color: #f0e6d0;
        min-height: 25px;
      }
      #fileName, #audioStatus {
        font-size: 0.85rem;
        color: rgba(255,215,0,0.6);
        margin-left: 10px;
      }
      .file-input-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
      .file-input-wrapper input[type="file"] { display: none; }
      .record-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
    </style>
  </head>
  <body>

    <div class="container">
      <h1>✦ Send your message to GOD ✦</h1>

      <form id="messageForm">
        <textarea id="messageInput" placeholder="Type your prayer, thought, or message..."></textarea>

        <div class="file-input-wrapper">
          <label for="imageUpload" class="btn btn-image">📷 Choose Image</label>
          <input type="file" id="imageUpload" accept="image/*">
          <span id="fileName">No file chosen</span>
        </div>

        <div class="record-wrapper">
          <button type="button" class="btn btn-record" id="recordBtn">🎙️ Record Voice</button>
          <span id="audioStatus">Not recording</span>
        </div>

        <button type="submit" class="btn-send" id="sendButton">✦ Send ✦</button>
      </form>

      <div id="status"></div>
    </div>

    <script>
      // ============================================
      // DOM references
      // ============================================
      var form = document.getElementById('messageForm');
      var messageInput = document.getElementById('messageInput');
      var imageUpload = document.getElementById('imageUpload');
      var fileName = document.getElementById('fileName');
      var recordBtn = document.getElementById('recordBtn');
      var audioStatus = document.getElementById('audioStatus');
      var sendBtn = document.getElementById('sendButton');
      var statusDiv = document.getElementById('status');

      // ============================================
      // Voice recorder
      // ============================================
      var mediaRecorder = null;
      var audioChunks = [];
      var isRecording = false;
      var audioData = null;

      recordBtn.addEventListener('click', async function() {
        if (isRecording) {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
          isRecording = false;
          this.classList.remove('recording');
          this.textContent = '🎙️ Record Voice';
          audioStatus.textContent = 'Processing...';
          return;
        }

        try {
          var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = function(event) {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = function() {
            var audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            var reader = new FileReader();
            reader.onload = function() {
              audioData = reader.result;
              audioStatus.textContent = '✓ Recording saved!';
              recordBtn.textContent = '🎙️ Record Again';
              recordBtn.classList.remove('recording');
            };
            reader.readAsDataURL(audioBlob);
            stream.getTracks().forEach(function(track) { track.stop(); });
          };

          mediaRecorder.start();
          isRecording = true;
          this.classList.add('recording');
          this.textContent = '⏹️ Stop Recording';
          audioStatus.textContent = 'Recording... Speak now';
          audioData = null;

        } catch (err) {
          audioStatus.textContent = '❌ Microphone access denied. Please allow and try again.';
          console.error(err);
        }
      });

      // ============================================
      // Image file handler
      // ============================================
      imageUpload.addEventListener('change', function() {
        fileName.textContent = this.files.length > 0 ? this.files[0].name : 'No file chosen';
      });

      // ============================================
      // Form submit
      // ============================================
      form.addEventListener('submit', function(e) {
        e.preventDefault();

        var message = messageInput.value.trim();
        if (!message) {
          statusDiv.style.color = '#ff6b6b';
          statusDiv.textContent = '✧ Please write a message first. ✧';
          return;
        }

        sendBtn.disabled = true;
        sendBtn.textContent = 'Sending...';
        statusDiv.style.color = '#ffd700';
        statusDiv.textContent = '✧ Preparing... ✧';

        // Get image data if any
        var imageData = null;
        if (imageUpload.files.length > 0) {
          var reader = new FileReader();
          reader.onload = function() {
            imageData = reader.result;
            // Now send everything
            sendEverything(message, imageData);
          };
          reader.readAsDataURL(imageUpload.files[0]);
        } else {
          sendEverything(message, null);
        }
      });

      // ============================================
      // Send to backend
      // ============================================
      function sendEverything(message, imageData) {
        // We'll get IP and userAgent from the backend itself via google.script.run
        // We pass the message, imageData, audioData, and the backend will get IP from request
        // But we still send userAgent and timestamp from client.

        var userAgent = navigator.userAgent || 'Not available';
        var timestamp = new Date().toString();

        statusDiv.textContent = '✧ Your message is ascending... ✧';

        // Ensure google.script.run is available
        if (typeof google === 'undefined' || !google.script) {
          statusDiv.style.color = '#ff6b6b';
          statusDiv.textContent = '✧ Error: google.script.run not available. Please reload the page.';
          sendBtn.disabled = false;
          sendBtn.textContent = '✦ Send ✦';
          return;
        }

        google.script.run
          .withSuccessHandler(function(result) {
            if (result.includes('Success')) {
              statusDiv.style.color = '#7bed9f';
              statusDiv.textContent = '✓ ' + result;
              messageInput.value = '';
              imageUpload.value = '';
              fileName.textContent = 'No file chosen';
              audioData = null;
              audioStatus.textContent = 'Not recording';
              recordBtn.textContent = '🎙️ Record Voice';
              recordBtn.classList.remove('recording');
            } else {
              statusDiv.style.color = '#ff6b6b';
              statusDiv.textContent = '✧ ' + result;
            }
            sendBtn.disabled = false;
            sendBtn.textContent = '✦ Send ✦';
          })
          .withFailureHandler(function(err) {
            statusDiv.style.color = '#ff6b6b';
            statusDiv.textContent = '✧ Error: ' + err.message;
            sendBtn.disabled = false;
            sendBtn.textContent = '✦ Send ✦';
          })
          .sendMessage(
            message,
            '', // ip – will be filled by backend
            userAgent,
            timestamp,
            imageData,
            audioData
          );
      }
    </script>

  </body>
</html>
